<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banderas · Geojuegos</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚩</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="game">
    <header>
      <a class="home" href="../" title="Geojuegos">←</a>
      <h1>Band<em>eras</em></h1>
      <span class="sub">¿de qué país es?</span>
    </header>

    <main>
      <div id="stage">
        <div id="flag-box" role="img" aria-label="Bandera oculta">
          <img id="flag" alt="" draggable="false" />
          <div id="cover" aria-hidden="true"></div>
        </div>
      </div>

      <form id="guess-form" autocomplete="off">
        <div id="combo">
          <input
            id="guess"
            placeholder="Escribe un país…"
            spellcheck="false"
            autocomplete="off"
            aria-autocomplete="list"
          />
          <ul id="suggestions" hidden></ul>
        </div>
        <button id="btn-guess" type="submit">Probar</button>
      </form>

      <ol id="attempts"></ol>

      <!-- Persistente y fuera de #result: aria-live dentro de un contenedor hidden no anuncia. -->
      <p id="verdict" aria-live="polite"></p>

      <section id="result" hidden>
        <button id="btn-again" type="button">Jugar otra vez</button>
      </section>
    </main>
    <script type="module" src="/src/banderas.ts"></script>
  </body>
</html>
